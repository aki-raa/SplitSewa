services:
  mysql:
    image: mysql:8.0
    container_name: splitsewa-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: SplitSewa
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: splitsewa-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/SplitSewa
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: thisismysecretkeythatisatleast32characterslong
      JWT_EXPIRATION_MS: 86400000
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

volumes:
  mysql-data: